<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Dark Obsidian Fill -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141721" />
      <stop offset="50%" stop-color="#0B0D11" />
      <stop offset="100%" stop-color="#050608" />
    </linearGradient>

    <!-- Metallic/Neon Accent Border Rim Glow -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.45" />
      <stop offset="40%" stop-color="#7F9CF5" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#7F9CF5" stop-opacity="0.1" />
    </linearGradient>

    <!-- Center Radial Spotlight Glow -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7F9CF5" stop-opacity="0.25" />
      <stop offset="70%" stop-color="#7F9CF5" stop-opacity="0.0" />
    </radialGradient>

    <!-- Emblem Primary Gradient Fill -->
    <linearGradient id="emblemGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="35%" stop-color="#d0dcfd" />
      <stop offset="100%" stop-color="#7F9CF5" />
    </linearGradient>

    <!-- Outer Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.65" />
    </filter>
  </defs>

  <!-- Apple-Style Rounded Squircle Container -->
  <rect x="24" y="24" width="464" height="464" rx="128" ry="128" fill="url(#bgGrad)" stroke="url(#rimGrad)" stroke-width="10" filter="url(#shadow)" />

  <!-- Inner Spotlight Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#centerGlow)" />

  <!-- Inner Glass Reflection Curve Top -->
  <path d="M 74 74 Q 256 110 438 74 A 128 128 0 0 1 438 180 Q 256 130 74 180 A 128 128 0 0 1 74 74 Z" fill="#ffffff" opacity="0.06" />

  <!-- Bold Geometric Monogram / Emblem -->
  <g transform="translate(0, 15)">
    <!-- Main A Silhouette Structure -->
    <path d="M 256 120 L 368 350 H 318 L 292 296 H 220 L 194 350 H 144 L 256 120 Z M 256 185 L 235 254 H 277 L 256 185 Z" fill="url(#emblemGrad)" />
    
    <!-- Dynamic Orbit Ring Crossing the Monogram -->
    <path d="M 130 290 C 130 220, 382 220, 382 290" fill="none" stroke="#7F9CF5" stroke-width="16" stroke-linecap="round" opacity="0.85" />
    <circle cx="382" cy="290" r="12" fill="#ffffff" />
  </g>
</svg>
